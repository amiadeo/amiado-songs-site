<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עמיאדו — ספר שירים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME VARIABLES ── */
    :root {
      --bg:           #ede8df;
      --page-bg:      #ffffff;
      --page-shadow:  0 2px 24px rgba(0,0,0,0.09);
      --text:         #1a1a1a;
      --text-body:    #2a2a2a;
      --text-dim:     #3a3a3a;
      --border:       #e8dcc8;
      --border-toc:   #ddd3be;
      --analysis-bg:  #faf8f3;
      --toc-name:     #2a2a2a;
      --song-title:   #0d1117;
      --btn-back:     #888;
    }

    body.dark {
      --bg:           #0d1117;
      --page-bg:      #111620;
      --page-shadow:  0 2px 32px rgba(0,0,0,0.5);
      --text:         rgba(255,255,255,0.92);
      --text-body:    rgba(255,255,255,0.82);
      --text-dim:     rgba(255,255,255,0.65);
      --border:       rgba(201,168,76,0.18);
      --border-toc:   rgba(255,255,255,0.08);
      --analysis-bg:  #181d2a;
      --toc-name:     rgba(255,255,255,0.82);
      --song-title:   rgba(255,255,255,0.95);
      --btn-back:     rgba(255,255,255,0.35);
    }

    /* ── BASE ── */
    body {
      font-family: 'Frank Ruhl Libre', 'David Libre', 'Times New Roman', serif;
      direction: rtl;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ── SCREEN CONTROLS ── */
    .controls {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.6rem;
    }

    .btn-print {
      background: #c9a84c;
      color: #fff;
      border: none;
      padding: 0.9rem 2.2rem;
      font-size: 1.05rem;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(201,168,76,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-print:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(201,168,76,0.55);
    }

    .btn-theme {
      background: none;
      border: 1px solid rgba(201,168,76,0.4);
      color: #c9a84c;
      padding: 0.5rem 1.1rem;
      font-size: 0.82rem;
      font-family: 'Heebo', sans-serif;
      font-weight: 500;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .btn-theme:hover { background: rgba(201,168,76,0.1); border-color: #c9a84c; }

    .btn-back {
      font-size: 0.82rem;
      color: var(--btn-back);
      font-family: 'Heebo', sans-serif;
      text-decoration: none;
      padding: 0.25rem 0;
      transition: color 0.2s;
    }
    .btn-back:hover { color: #c9a84c; }

    /* ── BOOK WRAPPER ── */
    .book {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 8rem;
    }

    /* ── PAGE BASE ── */
    .page {
      background: var(--page-bg);
      margin-bottom: 1.5rem;
      box-shadow: var(--page-shadow);
      position: relative;
      overflow: hidden;
      transition: background 0.35s ease, box-shadow 0.35s ease;
    }

    /* ── COVER ── */
    .cover {
      background: #0d1117;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 3rem;
    }

    .cover-logo {
      width: 110px;
      margin-bottom: 3.5rem;
      filter: drop-shadow(0 0 24px rgba(201,168,76,0.35));
    }

    .cover-title {
      font-size: clamp(3.5rem, 8vw, 5rem);
      font-weight: 900;
      color: #c9a84c;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.8rem;
    }

    .cover-subtitle {
      font-size: 1.3rem;
      color: rgba(255,255,255,0.5);
      font-weight: 300;
      font-family: 'Heebo', sans-serif;
    }

    .cover-ornament {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 2.5rem auto;
    }

    .cover-year {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.25);
      font-family: 'Heebo', sans-serif;
      letter-spacing: 0.2em;
    }

    /* ── TABLE OF CONTENTS ── */
    .toc-page {
      padding: 4rem 5rem;
    }

    .toc-heading {
      font-size: 1.8rem;
      font-weight: 700;
      color: #c9a84c;
      font-family: 'Heebo', sans-serif;
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1.5px solid var(--border);
    }

    .toc-list {
      list-style: none;
      columns: 2;
      column-gap: 3rem;
    }

    .toc-item {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px dotted var(--border-toc);
      break-inside: avoid;
    }

    .toc-num {
      font-family: 'Heebo', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #c9a84c;
      min-width: 22px;
      flex-shrink: 0;
    }

    .toc-name {
      font-size: 1rem;
      color: var(--toc-name);
    }

    /* ── SONG CHAPTER ── */
    .song-page {
      padding: 4rem 5rem;
    }

    .song-chapter-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1.5px solid var(--border);
    }

    .song-meta {
      flex: 1;
    }

    .song-num {
      font-family: 'Heebo', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .song-title-h {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--song-title);
      line-height: 1.15;
    }

    .song-cover-img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }

    .song-cover-placeholder {
      width: 130px;
      height: 130px;
      border-radius: 6px;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .song-cover-placeholder svg {
      width: 60px;
      height: 60px;
      opacity: 0.4;
    }

    /* ── LYRICS ── */
    .lyrics-block {
      margin-bottom: 2.5rem;
    }

    .lyrics-section-item {
      margin-bottom: 1.8rem;
    }

    .section-label {
      font-family: 'Heebo', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .lyric-line {
      font-size: 1.08rem;
      line-height: 2.1;
      color: var(--text-body);
      display: block;
    }

    /* ── ANALYSIS ── */
    .analysis-block {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1.5px solid var(--border);
    }

    .analysis-block-heading {
      font-family: 'Heebo', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .analysis-card {
      margin-bottom: 1.4rem;
      padding: 1.25rem 1.5rem 1.25rem 1.5rem;
      background: var(--analysis-bg);
      border-radius: 6px;
      border-right: 3px solid #c9a84c;
      page-break-inside: avoid;
      break-inside: avoid;
      transition: background 0.35s ease;
    }

    .analysis-card-title {
      font-family: 'Heebo', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .analysis-card-text {
      font-size: 0.92rem;
      line-height: 1.9;
      color: var(--text-dim);
    }

    /* ── PRINT ── */
    @media print {
      @page {
        size: A4 portrait;
        margin: 18mm 22mm 18mm 22mm;
      }

      body { background: transparent; }

      .controls { display: none !important; }

      .book {
        max-width: none;
        padding: 0;
        margin: 0;
      }

      .page {
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }

      .cover {
        min-height: 100vh;
        height: 100vh;
      }

      .song-page {
        page-break-before: always;
        break-before: page;
      }

      .analysis-card {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .lyrics-section-item {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .toc-list {
        columns: 2;
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <button class="btn-print" onclick="window.print()">הדפס / שמור PDF</button>
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()">🌙 עיצוב כהה</button>
    <a class="btn-back" href="index.html">← חזרה לאתר</a>
  </div>

  <div class="book" id="book">
    <!-- ── COVER ── -->
    <div class="page cover" id="cover">
      <img class="cover-logo" src="aologo.svg" alt="עמיאדו" onerror="this.style.display='none'">
      <div class="cover-title">עמיאדו</div>
      <div class="cover-subtitle">ספר שירים</div>
      <div class="cover-ornament"></div>
      <div class="cover-year" id="coverYear"></div>
    </div>

    <!-- ── TOC ── -->
    <div class="page toc-page" id="toc-container">
      <div class="toc-heading">תוכן עניינים</div>
      <ul class="toc-list" id="toc-list"></ul>
    </div>

    <!-- ── SONGS ── -->
    <div id="songs-container"></div>
  </div>

  <script src="app.js"></script>
  <script>
    // Theme toggle
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('themeBtn').textContent = isDark ? '☀️ עיצוב בהיר' : '🌙 עיצוב כהה';
      localStorage.setItem('book-theme', isDark ? 'dark' : 'light');
    }
    // Restore saved theme
    if (localStorage.getItem('book-theme') === 'dark') {
      document.body.classList.add('dark');
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.textContent = '☀️ עיצוב בהיר';
      });
    }
  </script>
  <script>
    (function () {
      'use strict';

      const ANALYSIS_LABELS = {
        abstract:     'תקציר',
        structural:   'מבנה ושפה',
        psychological:'פסיכולוגיה ורגש',
        academic:     'קריאה אקדמית'
      };

      const COVER_MAP = {
        'maga-bamilim':            'songs8.jpeg',
        'shigaon-amorfi':          'songs22.jpeg',
        'hargasha-meshuna':        'songs12.jpeg',
        'al-ktsot-hatsbaot':       'songs1.jpeg',
        'banahar-sheli':           'songs3.jpeg',
        'lo-amiti':                'songs21.jpeg',
        'makom-batuach':           'songs17.jpeg',
        'london':                  'songs2.jpeg',
        'efshar':                  'songs4.jpeg',
        'porkan-mini-zol':         'songs10.jpeg',
        'simanim-shel-bots':       'songs13.jpeg',
        'gibor-al':                'songs18.jpeg',
        'ahava-amitit':            'songs20.jpeg',
        'ben-zona':                'songs5.jpeg',
        'shalachat':               'songs7.jpeg',
        'lifamim':                 'songs27.jpeg',
        'harbe-zman':              'songs32.jpeg',
        'avak-hair':               'songs25.jpeg',
        'keshal-rigshi':           'songs6.jpeg',
        'kach-hakol':              'songs31.jpeg',
        'lo-noten-laze-koach':     'songs24.jpeg',
        'mekumatim':               'songs30.jpeg',
        'eich-ze':                 'songs15.jpeg',
        'ani-nishar':              'songs19.jpeg',
        'yafe-tamid':              'songs26.jpeg',
        'lo-od-amok':              'songs9.jpeg',
        'yeled-shel-ima-mutzlach': 'songs34.jpeg',
        'boche-lifamim':           'songs16.jpeg',
        'lo-pashut':               'songs11.jpeg',
        'chozer-elay':             'songs14.jpeg',
        'kimeat-shakuf':           'songs33.jpeg',
        'at':                      'songs29.jpeg',
      };

      const songs = window.SONGS || [];

      // Year on cover
      document.getElementById('coverYear').textContent = new Date().getFullYear();

      // Build TOC
      const tocList = document.getElementById('toc-list');
      songs.forEach((song, i) => {
        const li = document.createElement('li');
        li.className = 'toc-item';
        li.innerHTML = `<span class="toc-num">${i + 1}</span><span class="toc-name">${song.title}</span>`;
        tocList.appendChild(li);
      });

      // Build song pages
      const container = document.getElementById('songs-container');

      songs.forEach((song, i) => {
        const page = document.createElement('div');
        page.className = 'page song-page';

        const imgSrc = COVER_MAP[song.id];
        const coverHtml = imgSrc
          ? `<img class="song-cover-img" src="${imgSrc}" alt="${song.title}" loading="eager">`
          : `<div class="song-cover-placeholder">
               <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                 <circle cx="30" cy="30" r="22" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
               </svg>
             </div>`;

        // Lyrics HTML
        let lyricsHtml = '<div class="lyrics-block">';
        if (song.lyrics && song.lyrics.length) {
          song.lyrics.forEach(sec => {
            lyricsHtml += `<div class="lyrics-section-item">`;
            if (sec.section) {
              lyricsHtml += `<div class="section-label">${sec.section}</div>`;
            }
            (sec.lines || []).forEach(line => {
              lyricsHtml += `<span class="lyric-line">${line}</span>`;
            });
            lyricsHtml += `</div>`;
          });
        }
        lyricsHtml += '</div>';

        // Analysis HTML
        let analysisHtml = '';
        if (song.analysis) {
          analysisHtml += `<div class="analysis-block">
            <div class="analysis-block-heading">ניתוח יצירה</div>`;
          Object.entries(song.analysis).forEach(([key, val]) => {
            if (!val) return;
            const label = ANALYSIS_LABELS[key] || key;
            analysisHtml += `<div class="analysis-card">
              <div class="analysis-card-title">${label}</div>
              <div class="analysis-card-text">${val}</div>
            </div>`;
          });
          analysisHtml += `</div>`;
        }

        page.innerHTML = `
          <div class="song-chapter-header">
            <div class="song-meta">
              <div class="song-num">שיר ${i + 1} מתוך ${songs.length}</div>
              <div class="song-title-h">${song.title}</div>
            </div>
            ${coverHtml}
          </div>
          ${lyricsHtml}
          ${analysisHtml}
        `;

        container.appendChild(page);
      });
    })();
  </script>
</body>
</html>
